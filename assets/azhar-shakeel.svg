  <line x1="0" y1="160" x2="900" y2="160" stroke="white" stroke-opacity="0.014" stroke-width="1"/>
  <line x1="0" y1="240" x2="900" y2="240" stroke="white" stroke-opacity="0.014" stroke-width="1"/>
  <line x1="0" y1="320" x2="900" y2="320" stroke="white" stroke-opacity="0.014" stroke-width="1"/>
  <line x1="0" y1="400" x2="900" y2="400" stroke="white" stroke-opacity="0.014" stroke-width="1"/>
  <line x1="225" y1="0" x2="225" y2="445" stroke="white" stroke-opacity="0.01" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="445" stroke="white" stroke-opacity="0.01" stroke-width="1"/>
