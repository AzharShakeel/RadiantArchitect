  <text x="552" y="372" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA" style="animation:pillIn 0.6s ease 1.7s both">⚡ FastAPI</text>

  <rect x="602" y="355" width="82"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1" style="animation:pillIn 0.6s ease 1.8s both"/>
