  <text x="337" y="246" text-anchor="middle" font-family="system-ui,sans-serif" font-size="34">⚡</text>
  <text x="337" y="265" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" fill="#2563EB" letter-spacing="4">PRECISION</text>
