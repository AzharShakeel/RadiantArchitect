<svg width="100%" viewBox="0 0 900 445" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ASD</title>
  <desc>GitHub profile banner for Azhar Shakeel, System Architect and AI builder.</desc>

  <defs>
    <style>
      @keyframes pillIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
    </style>

    <linearGradient id="shimmer" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1000" y2="0">
      <stop offset="0%"   stop-color="#B0AEAA"/>
      <stop offset="46%"  stop-color="#B0AEAA"/>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="54%"  stop-color="#B0AEAA"/>
      <stop offset="100%" stop-color="#B0AEAA"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1000 0;1000 0;1000 0" keyTimes="0;0.5;1" dur="5s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3AAFCC" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3AAFCC" stop-opacity="0.85"/>
      <stop offset="70%"  stop-color="#3AAFCC" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3AAFCC" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="sep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1E5F7A" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#1E5F7A" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#3AAFCC" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#1E5F7A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1E5F7A" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="botBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3AAFCC" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3AAFCC" stop-opacity="0.35"/>
      <stop offset="70%"  stop-color="#3AAFCC" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#3AAFCC" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="midSep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1A2A3A" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#1A2A3A" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#1A2A3A" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#1A2A3A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1A2A3A" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="div1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4B5563" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#4B5563" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4B5563" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="div2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1D4ED8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#1D4ED8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="div3" x1="0%" y1="0%" x2="100%" y2="0%">
