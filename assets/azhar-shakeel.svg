<svg width="100%" viewBox="0 0 900 445" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>ASD — System Architect · AI Builder</title>
  <desc>GitHub profile banner for ASD, System Architect and AI builder.</desc>

  <defs>
    <style>
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(7px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes pillIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes bracketDraw {
        from { stroke-dashoffset: 40; opacity: 0; }
        to   { stroke-dashoffset: 0;  opacity: 1; }
      }
      @keyframes sepDraw {
        from { stroke-dashoffset: 900; }
        to   { stroke-dashoffset: 0; }
      }
      @keyframes scanLine {
        0%   { transform: translateY(-2px); opacity: 0; }
        5%   { opacity: 0.7; }
        90%  { opacity: 0.4; }
        100% { transform: translateY(447px); opacity: 0; }
      }
      @keyframes glitch {
        0%,91%,100% { transform: none; }
        92%          { transform: translate(-3px, 0) skewX(-1deg); }
        93%          { transform: translate(3px, 0) skewX(1deg); }
        94%          { transform: translate(-2px, 0); }
        95%          { transform: none; }
      }
      @keyframes glitchFill {
        0%,91%,100% { opacity: 0; }
        92%          { opacity: 0.55; transform: translate(4px, -1px); }
        93%          { opacity: 0.4;  transform: translate(-3px, 1px); }
        94%          { opacity: 0; }
      }
      @keyframes topGlow {
        0%,100% { opacity: 0.85; }
        50%     { opacity: 1; }
      }
      @keyframes cursorBlink {
        0%,100% { opacity: 1; }
        50%     { opacity: 0; }
      }
    </style>

    <!-- ASD shimmer gradient -->
    <linearGradient id="shimmer" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%"   stop-color="#5A7080"/>
      <stop offset="42%"  stop-color="#8FA8B8"/>
      <stop offset="46%"  stop-color="#D0E4EE"/>
      <stop offset="50%"  stop-color="#FFFFFF"/>
      <stop offset="54%"  stop-color="#D0E4EE"/>
      <stop offset="58%"  stop-color="#8FA8B8"/>
      <stop offset="100%" stop-color="#5A7080"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1200 0;1200 0;1200 0" keyTimes="0;0.6;1" dur="4.5s" repeatCount="indefinite"/>
    </linearGradient>

    <!-- Top / bottom edge bars -->
    <linearGradient id="topBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3AAFCC" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3AAFCC" stop-opacity="0.85"/>
      <stop offset="70%"  stop-color="#3AAFCC" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#3AAFCC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="botBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3AAFCC" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3AAFCC" stop-opacity="0.3"/>
      <stop offset="70%"  stop-color="#3AAFCC" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3AAFCC" stop-opacity="0"/>
    </linearGradient>

    <!-- Separator lines -->
    <linearGradient id="sep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1E5F7A" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#1E5F7A" stop-opacity="0.5"/>
      <stop offset="50%"  stop-color="#3AAFCC" stop-opacity="1"/>
      <stop offset="85%"  stop-color="#1E5F7A" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#1E5F7A" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="midSep" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1A2A3A" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#1A2A3A" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#243444" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#1A2A3A" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1A2A3A" stop-opacity="0"/>
    </linearGradient>

    <!-- Pillar dividers -->
    <linearGradient id="div1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4B5563" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#4B5563" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4B5563" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="div2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1D4ED8" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#1D4ED8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#1D4ED8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="div3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#B45309" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#B45309" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="div4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#9F1239" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#9F1239" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#9F1239" stop-opacity="0"/>
    </linearGradient>

    <!-- Scan line gradient -->
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3AAFCC" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#3AAFCC" stop-opacity="0.6"/>
      <stop offset="50%"  stop-color="#8FDFEF" stop-opacity="1"/>
      <stop offset="80%"  stop-color="#3AAFCC" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3AAFCC" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ░░ BACKGROUND ░░ -->
  <rect width="900" height="445" fill="#070B15"/>

  <!-- Grid lines -->
  <line x1="0" y1="80"  x2="900" y2="80"  stroke="white" stroke-opacity="0.012" stroke-width="1"/>
  <line x1="0" y1="160" x2="900" y2="160" stroke="white" stroke-opacity="0.012" stroke-width="1"/>
  <line x1="0" y1="240" x2="900" y2="240" stroke="white" stroke-opacity="0.012" stroke-width="1"/>
  <line x1="0" y1="320" x2="900" y2="320" stroke="white" stroke-opacity="0.012" stroke-width="1"/>
  <line x1="0" y1="400" x2="900" y2="400" stroke="white" stroke-opacity="0.012" stroke-width="1"/>
  <line x1="225" y1="0" x2="225" y2="445" stroke="white" stroke-opacity="0.008" stroke-width="1"/>
  <line x1="450" y1="0" x2="450" y2="445" stroke="white" stroke-opacity="0.008" stroke-width="1"/>
  <line x1="675" y1="0" x2="675" y2="445" stroke="white" stroke-opacity="0.008" stroke-width="1"/>

  <!-- Edge accents -->
  <rect x="0" y="0"   width="900" height="2" fill="url(#topBar)"
    style="animation: topGlow 3s ease-in-out 1s infinite"/>
  <rect x="0" y="443" width="900" height="2" fill="url(#botBar)"/>

  <!-- ░░ SCAN LINE (one pass on load) ░░ -->
  <rect x="0" y="0" width="900" height="1.5" fill="url(#scanGrad)"
    style="animation: scanLine 2.2s cubic-bezier(0.4,0,0.6,1) 0.1s 1 forwards"/>

  <!-- ░░ CORNER BRACKETS ░░ -->
  <path d="M28 28 L28 16 L40 16"
    fill="none" stroke="#3AAFCC" stroke-opacity="0.7" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="40"
    style="animation: bracketDraw 0.5s ease 0.3s both"/>

  <path d="M872 28 L872 16 L860 16"
    fill="none" stroke="#3AAFCC" stroke-opacity="0.7" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="40"
    style="animation: bracketDraw 0.5s ease 0.4s both"/>

  <path d="M28 417 L28 429 L40 429"
    fill="none" stroke="#3AAFCC" stroke-opacity="0.25" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="40"
    style="animation: bracketDraw 0.5s ease 0.5s both"/>

  <path d="M872 417 L872 429 L860 429"
    fill="none" stroke="#3AAFCC" stroke-opacity="0.25" stroke-width="1.5"
    stroke-linecap="round" stroke-linejoin="round"
    stroke-dasharray="40"
    style="animation: bracketDraw 0.5s ease 0.6s both"/>

  <!-- ░░ IDENTITY BLOCK ░░ -->

  <!-- ASD — glitch shadow layer -->
  <text x="450" y="122" text-anchor="middle"
    font-family="'Courier New',Consolas,monospace"
    font-size="110" font-weight="700" letter-spacing="32"
    fill="#3AAFCC" opacity="0"
    style="animation: glitchFill 7s ease 2s infinite">ASD</text>

  <!-- ASD — main shimmer layer -->
  <text x="450" y="122" text-anchor="middle"
    font-family="'Courier New',Consolas,monospace"
    font-size="110" font-weight="700" letter-spacing="32"
    fill="url(#shimmer)"
    style="animation: glitch 7s ease 2s infinite; opacity:0; animation-fill-mode: both; animation-delay: 0.7s">ASD</text>

  <!-- Blinking cursor -->
  <text x="668" y="120" text-anchor="start"
    font-family="'Courier New',Consolas,monospace"
    font-size="18" font-weight="400"
    fill="#3AAFCC" opacity="0.6"
    style="animation: cursorBlink 1.1s step-end 1.5s infinite, fadeUp 0.4s ease 0.9s both">▋</text>

  <!-- Separator (draws in from center) -->
  <line x1="75" y1="142" x2="825" y2="142"
    stroke="url(#sep)" stroke-width="1"
    stroke-dasharray="900"
    style="animation: sepDraw 1s ease-out 0.85s both"/>

  <!-- Role line -->
  <text x="450" y="165" text-anchor="middle"
    font-family="'Courier New',Consolas,monospace"
    font-size="10" fill="#2E7A96" letter-spacing="3.5"
    style="animation: fadeUp 0.7s ease 1.0s both">SYSTEM ARCHITECT  ·  ML ENGINEERING  ·  FULL-STACK SYSTEMS</text>

  <!-- Tagline -->
  <text x="450" y="186" text-anchor="middle"
    font-family="Georgia,'Times New Roman',serif"
    font-size="12" fill="#3A8AA8" font-style="italic"
    style="animation: fadeUp 0.7s ease 1.1s both">Precision That Thinks — Systems engineered to outlast the hype.</text>

  <!-- Thin rule -->
  <line x1="60" y1="202" x2="840" y2="202" stroke="white" stroke-opacity="0.04" stroke-width="1"/>

  <!-- ░░ DARK PSYCHOLOGY PILLARS ░░ -->

  <!-- SILENCE -->
  <g style="animation: fadeUp 0.6s ease 1.2s both">
    <rect x="52"  y="210" width="120" height="1.5" rx="0.75" fill="url(#div1)"/>
    <text x="112" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="34">🌑</text>
    <text x="112" y="267" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" fill="#6B7280" letter-spacing="4">SILENCE</text>
    <text x="112" y="282" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#374151" font-style="italic">build in the void.</text>
  </g>

  <!-- PRECISION -->
  <g style="animation: fadeUp 0.6s ease 1.3s both">
    <rect x="277" y="210" width="120" height="1.5" rx="0.75" fill="url(#div2)"/>
    <text x="337" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="34">⚡</text>
    <text x="337" y="267" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" fill="#2563EB" letter-spacing="4">PRECISION</text>
    <text x="337" y="282" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#1E3A8A" font-style="italic">every line, a decision.</text>
  </g>

  <!-- PATIENCE -->
  <g style="animation: fadeUp 0.6s ease 1.4s both">
    <rect x="502" y="210" width="120" height="1.5" rx="0.75" fill="url(#div3)"/>
    <text x="562" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="34">🔱</text>
    <text x="562" y="267" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" fill="#B45309" letter-spacing="4">PATIENCE</text>
    <text x="562" y="282" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#78350F" font-style="italic">the long game wins.</text>
  </g>

  <!-- OUTLAST -->
  <g style="animation: fadeUp 0.6s ease 1.5s both">
    <rect x="727" y="210" width="120" height="1.5" rx="0.75" fill="url(#div4)"/>
    <text x="787" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="34">💀</text>
    <text x="787" y="267" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" fill="#9F1239" letter-spacing="4">OUTLAST</text>
    <text x="787" y="282" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#7F1D1D" font-style="italic">they trend. you endure.</text>
  </g>

  <!-- ░░ STACK DIVIDER ░░ -->
  <g style="animation: fadeUp 0.6s ease 1.55s both">
    <rect x="60" y="298" width="780" height="1" fill="url(#midSep)"/>
    <text x="450" y="313" text-anchor="middle"
      font-family="'Courier New',Consolas,monospace"
      font-size="7.5" fill="#154F66" letter-spacing="5">◆  THE STACK  ◆</text>
  </g>

  <!-- ░░ TECH PILLS — ROW 1 ░░ -->
  <g style="animation: pillIn 0.5s ease 1.7s both">
    <rect x="167" y="322" width="80"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="207" y="339" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🐍 Python</text>
  </g>
  <g style="animation: pillIn 0.5s ease 1.8s both">
    <rect x="255" y="322" width="72"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="291" y="339" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🤖 AI/ML</text>
  </g>
  <g style="animation: pillIn 0.5s ease 1.9s both">
    <rect x="335" y="322" width="122" height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="396" y="339" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🧠 Deep Learning</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.0s both">
    <rect x="465" y="322" width="108" height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="519" y="339" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🔬 TensorFlow</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.1s both">
    <rect x="581" y="322" width="90"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="626" y="339" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🔥 PyTorch</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.2s both">
    <rect x="679" y="322" width="55"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="707" y="339" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">⚗️ JAX</text>
  </g>

  <!-- ░░ TECH PILLS — ROW 2 ░░ -->
  <g style="animation: pillIn 0.5s ease 1.9s both">
    <rect x="217" y="357" width="78"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="256" y="374" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">📊 NumPy</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.0s both">
    <rect x="303" y="357" width="82"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="344" y="374" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🐼 Pandas</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.1s both">
    <rect x="393" y="357" width="108" height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="447" y="374" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🔬 Scikit-learn</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.2s both">
    <rect x="509" y="357" width="85"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="552" y="374" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">⚡ FastAPI</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.3s both">
    <rect x="602" y="357" width="82"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="643" y="374" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🐳 Docker</text>
  </g>

  <!-- ░░ TECH PILLS — ROW 3 ░░ -->
  <g style="animation: pillIn 0.5s ease 2.1s both">
    <rect x="165" y="392" width="95"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="213" y="409" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🌐 Full-Stack</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.2s both">
    <rect x="268" y="392" width="115" height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="326" y="409" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">💻 HTML/CSS/JS</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.3s both">
    <rect x="391" y="392" width="103" height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="443" y="409" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">📘 TypeScript</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.4s both">
    <rect x="502" y="392" width="80"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="542" y="409" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🐧 Linux</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.5s both">
    <rect x="590" y="392" width="62"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="621" y="409" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">🔀 Git</text>
  </g>
  <g style="animation: pillIn 0.5s ease 2.6s both">
    <rect x="660" y="392" width="75"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1"/>
    <text x="698" y="409" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA">⚙️ CI/CD</text>
  </g>

  <!-- Copyright -->
  <text x="450" y="434" text-anchor="middle"
    font-family="'Courier New',Consolas,monospace"
    font-size="7.5" fill="#0D1F2E" letter-spacing="2"
    style="animation: fadeUp 0.6s ease 2.6s both">CC BY-NC 4.0  ·  © 2026 ASD  ·  ALL RIGHTS RESERVED</text>

</svg>
