  <text x="112" y="246" text-anchor="middle" font-family="system-ui,sans-serif" font-size="34">🌑</text>
  <text x="112" y="265" text-anchor="middle" font-family="'Courier New',Consolas,monospace" font-size="10" fill="#6B7280" letter-spacing="4">SILENCE</text>
  <text x="112" y="280" text-anchor="middle" font-family="Georgia,serif" font-size="9" fill="#374151" font-style="italic">build in the void.</text>

  <!-- PRECISION -->
