      <stop offset="50%"  stop-color="#B45309" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#B45309" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="div4" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#9F1239" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#9F1239" stop-opacity="0.8"/>
