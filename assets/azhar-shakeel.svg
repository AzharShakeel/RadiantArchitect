  <rect x="679" y="320" width="55"  height="26" rx="13" fill="#0A0F1A" stroke="#1C2E44" stroke-width="1" style="animation:pillIn 0.6s ease 1.7s both"/>
  <text x="707" y="337" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="12" fill="#6B8BAA" style="animation:pillIn 0.6s ease 1.7s both">⚗️ JAX</text>

