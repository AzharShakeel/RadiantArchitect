  <path d="M28 28 L28 16 L40 16"       fill="none" stroke="#3AAFCC" stroke-opacity="0.6"  stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M872 28 L872 16 L860 16"    fill="none" stroke="#3AAFCC" stroke-opacity="0.6"  stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M28 417 L28 429 L40 429"    fill="none" stroke="#3AAFCC" stroke-opacity="0.2"  stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M872 417 L872 429 L860 429" fill="none" stroke="#3AAFCC" stroke-opacity="0.2"  stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

