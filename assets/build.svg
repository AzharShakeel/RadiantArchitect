<!-- Proprietary asset. Reuse, modification, or redistribution is prohibited without prior written permission. -->
<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="edgeTop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3AAFCC" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3AAFCC" stop-opacity="0.7"/>
      <stop offset="70%"  stop-color="#3AAFCC" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#3AAFCC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="edgeBot" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#3AAFCC" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#3AAFCC" stop-opacity="0.25"/>
      <stop offset="70%"  stop-color="#3AAFCC" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#3AAFCC" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="cardStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1A3A4A" stop-opacity="1"/>
      <stop offset="50%"  stop-color="#0D1F2D" stop-opacity="1"/>
      <stop offset="100%" stop-color="#1A3A4A" stop-opacity="1"/>
    </linearGradient>
    <radialGradient id="cardBg" cx="50%" cy="50%" r="60%">
      <stop offset="0%"   stop-color="#0E1A28" stop-opacity="1"/>
      <stop offset="100%" stop-color="#070B15" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="textShimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6B8BAA"/>
      <stop offset="40%"  stop-color="#6B8BAA"/>
      <stop offset="50%"  stop-color="#C8D8E8"/>
      <stop offset="60%"  stop-color="#6B8BAA"/>
      <stop offset="100%" stop-color="#6B8BAA"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-900 0;900 0;900 0" keyTimes="0;0.5;1" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes borderPulse { 0%,100%{opacity:0.5} 50%{opacity:1} }
    @keyframes cornerBlink { 0%,100%{opacity:0.7} 90%{opacity:0.7} 93%{opacity:0.15} 96%{opacity:0.7} }
    @keyframes textGlow    { 0%,100%{opacity:1}   50%{opacity:0.82} }
  </style>

  <rect width="900" height="220" fill="#070B15"/>

  <!-- Grid lines -->
  <line x1="0" y1="73"  x2="900" y2="73"  stroke="white" stroke-opacity="0.012" stroke-width="1"/>
  <line x1="0" y1="146" x2="900" y2="146" stroke="white" stroke-opacity="0.012" stroke-width="1"/>
  <line x1="300" y1="0" x2="300" y2="220" stroke="white" stroke-opacity="0.01"  stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="220" stroke="white" stroke-opacity="0.01"  stroke-width="1"/>

  <!-- Edge accents -->
  <rect x="0" y="0"   width="900" height="2" fill="url(#edgeTop)"/>
  <rect x="0" y="218" width="900" height="2" fill="url(#edgeBot)"/>

  <!-- Glow behind card -->
  <rect x="40" y="20" width="820" height="180" rx="18"
        fill="#0B1825" opacity="0.7" filter="url(#cardGlow)"/>

  <!-- Main card -->
  <rect x="44" y="24" width="812" height="172" rx="14"
        fill="url(#cardBg)"
        stroke="url(#cardStroke)" stroke-width="1.2"
        style="animation:borderPulse 4s ease-in-out infinite"/>

  <!-- Inner subtle border -->
  <rect x="50" y="30" width="800" height="160" rx="10"
        fill="none" stroke="#0D2030" stroke-width="0.6"/>

  <!-- Corner accents TL -->
  <g style="animation:cornerBlink 5s infinite">
    <line x1="44" y1="60" x2="44" y2="38" stroke="#3AAFCC" stroke-width="1.5"/>
    <line x1="44" y1="38" x2="70" y2="38" stroke="#3AAFCC" stroke-width="1.5"/>
  </g>
  <!-- TR -->
  <g style="animation:cornerBlink 5s 1s infinite">
    <line x1="856" y1="60" x2="856" y2="38" stroke="#3AAFCC" stroke-width="1.5"/>
    <line x1="856" y1="38" x2="830" y2="38" stroke="#3AAFCC" stroke-width="1.5"/>
  </g>
  <!-- BL -->
  <g style="animation:cornerBlink 5s 0.5s infinite">
    <line x1="44" y1="160" x2="44" y2="182" stroke="#3AAFCC" stroke-width="1.5"/>
    <line x1="44" y1="182" x2="70" y2="182" stroke="#3AAFCC" stroke-width="1.5"/>
  </g>
  <!-- BR -->
  <g style="animation:cornerBlink 5s 1.5s infinite">
    <line x1="856" y1="160" x2="856" y2="182" stroke="#3AAFCC" stroke-width="1.5"/>
    <line x1="856" y1="182" x2="830" y2="182" stroke="#3AAFCC" stroke-width="1.5"/>
  </g>

  <!-- ASCII art — platinum shimmer -->
  <text text-anchor="middle"
        font-family="'Courier New',Courier,monospace"
        font-size="17.5"
        fill="url(#textShimmer)"
        style="animation:textGlow 3s ease-in-out infinite">
    <tspan x="450" dy="78">██████╗ ██╗   ██╗██╗██╗     ██████╗</tspan>
    <tspan x="450" dy="22">██╔══██╗██║   ██║██║██║     ██╔══██╗</tspan>
    <tspan x="450" dy="22">██████╔╝██║   ██║██║██║     ██║  ██║</tspan>
    <tspan x="450" dy="22">██╔══██╗██║   ██║██║██║     ██║  ██║</tspan>
    <tspan x="450" dy="22">██████╔╝╚██████╔╝██║███████╗██████╔╝</tspan>
    <tspan x="450" dy="22">╚═════╝  ╚═════╝ ╚═╝╚══════╝╚═════╝</tspan>
  </text>
</svg>
