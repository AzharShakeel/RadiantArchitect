<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="cardGlow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="bubbleBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   style="stop-color:#3a3a3a;stop-opacity:1"/>
      <stop offset="50%"  style="stop-color:#2a2a2a;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#3a3a3a;stop-opacity:1"/>
    </linearGradient>
    <radialGradient id="cardBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   style="stop-color:#161616;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0e0e0e;stop-opacity:1"/>
    </radialGradient>
  </defs>

  <style>
    @keyframes borderPulse {
      0%, 100% { opacity: 0.6; }
      50%       { opacity: 1; }
    }
    @keyframes textGlow {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.85; }
    }
    @keyframes cornerBlink {
      0%, 100% { opacity: 0.8; }
      90%       { opacity: 0.8; }
      93%       { opacity: 0.2; }
      96%       { opacity: 0.8; }
    }
  </style>

  <!-- Outer background -->
  <rect width="900" height="220" fill="#0a0a0a"/>

  <!-- Bubble glow behind card -->
  <rect x="40" y="20" width="820" height="180" rx="18" ry="18"
        fill="#1a1a1a" opacity="0.6" filter="url(#cardGlow)"/>

  <!-- Main card bubble -->
  <rect x="44" y="24" width="812" height="172" rx="14" ry="14"
        fill="url(#cardBg)"
        stroke="url(#bubbleBorder)" stroke-width="1.2"
        style="animation: borderPulse 4s ease-in-out infinite;"/>

  <!-- Inner subtle border -->
  <rect x="50" y="30" width="800" height="160" rx="10" ry="10"
        fill="none" stroke="#222222" stroke-width="0.5"/>

  <!-- Corner accents TL -->
  <g style="animation: cornerBlink 5s infinite;">
    <line x1="44" y1="60" x2="44" y2="38" stroke="#484848" stroke-width="1.5"/>
    <line x1="44" y1="38" x2="70" y2="38" stroke="#484848" stroke-width="1.5"/>
  </g>
  <!-- Corner accents TR -->
  <g style="animation: cornerBlink 5s 1s infinite;">
    <line x1="856" y1="60" x2="856" y2="38" stroke="#484848" stroke-width="1.5"/>
    <line x1="856" y1="38" x2="830" y2="38" stroke="#484848" stroke-width="1.5"/>
  </g>
  <!-- Corner accents BL -->
  <g style="animation: cornerBlink 5s 0.5s infinite;">
    <line x1="44" y1="160" x2="44" y2="182" stroke="#484848" stroke-width="1.5"/>
    <line x1="44" y1="182" x2="70" y2="182" stroke="#484848" stroke-width="1.5"/>
  </g>
  <!-- Corner accents BR -->
  <g style="animation: cornerBlink 5s 1.5s infinite;">
    <line x1="856" y1="160" x2="856" y2="182" stroke="#484848" stroke-width="1.5"/>
    <line x1="856" y1="182" x2="830" y2="182" stroke="#484848" stroke-width="1.5"/>
  </g>

  <!-- ASCII art text - monospace centered -->
  <text text-anchor="middle" font-family="'Courier New', Courier, monospace" font-size="17.5" fill="#cccccc"
        style="animation: textGlow 3s ease-in-out infinite;">
    <tspan x="450" dy="78">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó ‚Ėą‚Ėą‚ēó   ‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēó     ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó</tspan>
    <tspan x="450" dy="22">‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó</tspan>
    <tspan x="450" dy="22">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ</tspan>
    <tspan x="450" dy="22">‚Ėą‚Ėą‚ēĒ‚ēź‚ēź‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚ēĎ   ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚ēĎ     ‚Ėą‚Ėą‚ēĎ  ‚Ėą‚Ėą‚ēĎ</tspan>
    <tspan x="450" dy="22">‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚ēö‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ‚Ėą‚Ėą‚ēĎ‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēó‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚Ėą‚ēĒ‚ēĚ</tspan>
    <tspan x="450" dy="22">‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ  ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ ‚ēö‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ‚ēö‚ēź‚ēź‚ēź‚ēź‚ēź‚ēĚ</tspan>
  </text>
</svg>
