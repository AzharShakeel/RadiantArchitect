<svg width="900" height="280" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="strongGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="blur1"/>
      <feGaussianBlur stdDeviation="12" result="blur2"/>
      <feGaussianBlur stdDeviation="20" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#00ff88;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#00ff88;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#00ff88;stop-opacity:1"/>
      <stop offset="70%" style="stop-color:#00ccff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#00ccff;stop-opacity:0"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00ff88" stroke-width="0.3" opacity="0.15"/>
    </pattern>
  </defs>

  <style>
    @keyframes scanSweep {
      0% { transform: translateY(-10px); opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { transform: translateY(290px); opacity: 0; }
    }
    @keyframes float1 {
      0%, 100% { transform: translate(0px, 0px); opacity: 0.8; }
      33% { transform: translate(8px, -12px); opacity: 0.4; }
      66% { transform: translate(-6px, -6px); opacity: 1; }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0px, 0px); opacity: 0.5; }
      33% { transform: translate(-10px, 8px); opacity: 1; }
      66% { transform: translate(5px, -10px); opacity: 0.3; }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0px, 0px); opacity: 1; }
      50% { transform: translate(12px, 6px); opacity: 0.2; }
    }
    @keyframes borderFlow {
      0% { stroke-dashoffset: 2000; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      45% { opacity: 1; }
      50% { opacity: 0; }
      55% { opacity: 1; }
    }
    @keyframes cornerFlicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.2; }
      94% { opacity: 1; }
      97% { opacity: 0.4; }
      98% { opacity: 1; }
    }
    @keyframes subtitleFade {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }
    @keyframes lineExtend {
      0% { stroke-dashoffset: 600; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes glowPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.85; }
    }
    @keyframes bgGlow {
      0%, 100% { opacity: 0.03; }
      50% { opacity: 0.08; }
    }
  </style>

  <!-- Background -->
  <rect width="900" height="280" fill="#0a0a0a"/>
  <rect width="900" height="280" fill="url(#grid)"/>

  <!-- Center radial glow -->
  <ellipse cx="450" cy="120" rx="300" ry="100" fill="#00ff88">
    <animate attributeName="opacity" values="0.03;0.08;0.03" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="100;120;100" dur="3s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Animated border -->
  <rect x="8" y="8" width="884" height="264" rx="4" ry="4"
        fill="none" stroke="url(#borderGrad)" stroke-width="1.5"
        stroke-dasharray="2000" stroke-dashoffset="2000">
    <animate attributeName="stroke-dashoffset" from="2000" to="0" dur="3s" fill="freeze"/>
  </rect>

  <!-- Corner TL -->
  <g style="animation: cornerFlicker 4s infinite;">
    <line x1="8" y1="30" x2="8" y2="8" stroke="#00ff88" stroke-width="2"/>
    <line x1="8" y1="8" x2="30" y2="8" stroke="#00ff88" stroke-width="2"/>
  </g>
  <!-- Corner TR -->
  <g style="animation: cornerFlicker 4s 0.5s infinite;">
    <line x1="892" y1="30" x2="892" y2="8" stroke="#00ccff" stroke-width="2"/>
    <line x1="892" y1="8" x2="870" y2="8" stroke="#00ccff" stroke-width="2"/>
  </g>
  <!-- Corner BL -->
  <g style="animation: cornerFlicker 4s 1s infinite;">
    <line x1="8" y1="250" x2="8" y2="272" stroke="#00ff88" stroke-width="2"/>
    <line x1="8" y1="272" x2="30" y2="272" stroke="#00ff88" stroke-width="2"/>
  </g>
  <!-- Corner BR -->
  <g style="animation: cornerFlicker 4s 1.5s infinite;">
    <line x1="892" y1="250" x2="892" y2="272" stroke="#00ccff" stroke-width="2"/>
    <line x1="892" y1="272" x2="870" y2="272" stroke="#00ccff" stroke-width="2"/>
  </g>

  <!-- Scan line sweep -->
  <rect x="0" y="0" width="900" height="3" fill="url(#scanGrad)" opacity="0.7"
        style="animation: scanSweep 4s linear infinite;"/>

  <!-- Floating particles -->
  <circle cx="80" cy="60" r="2" fill="#00ff88" style="animation: float1 5s ease-in-out infinite;"/>
  <circle cx="820" cy="80" r="1.5" fill="#00ccff" style="animation: float2 6s ease-in-out infinite;"/>
  <circle cx="150" cy="200" r="1.5" fill="#00ff88" style="animation: float3 4s ease-in-out infinite;"/>
  <circle cx="760" cy="210" r="2" fill="#00ccff" style="animation: float1 7s ease-in-out 1s infinite;"/>
  <circle cx="450" cy="30" r="1.5" fill="#00ff88" style="animation: float2 5.5s ease-in-out 0.5s infinite;"/>
  <circle cx="200" cy="140" r="1" fill="#00ff88" opacity="0.6" style="animation: float3 8s ease-in-out 2s infinite;"/>
  <circle cx="700" cy="150" r="1" fill="#00ccff" opacity="0.6" style="animation: float1 6s ease-in-out 3s infinite;"/>

  <!-- 3D depth shadow layers -->
  <text x="454" y="116" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="52" font-weight="bold"
        fill="#002211" letter-spacing="4">RADIANT ARCHITECT</text>
  <text x="452" y="114" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="52" font-weight="bold"
        fill="#004422" letter-spacing="4">RADIANT ARCHITECT</text>

  <!-- Main glowing title -->
  <text x="450" y="112" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="52" font-weight="bold"
        fill="#00ff88" letter-spacing="4" filter="url(#strongGlow)"
        style="animation: glowPulse 2.5s ease-in-out infinite;">
    RADIANT ARCHITECT
  </text>

  <!-- Top divider -->
  <line x1="150" y1="140" x2="750" y2="140" stroke="#00ff88" stroke-width="0.8" opacity="0.35"
        stroke-dasharray="600" stroke-dashoffset="600">
    <animate attributeName="stroke-dashoffset" from="600" to="0" dur="2s" begin="0.5s" fill="freeze"/>
  </line>

  <!-- Subtitle -->
  <text x="450" y="168" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="14"
        fill="#aaaaaa" letter-spacing="2"
        style="animation: subtitleFade 2s ease 1s both;">
    ENTERPRISE AI  ·  ALGORITHM ARCHITECTURE  ·  FULL-STACK SYSTEMS
  </text>

  <!-- Bottom divider -->
  <line x1="200" y1="192" x2="700" y2="192" stroke="#00ccff" stroke-width="0.8" opacity="0.25"
        stroke-dasharray="500" stroke-dashoffset="500">
    <animate attributeName="stroke-dashoffset" from="500" to="0" dur="2s" begin="1s" fill="freeze"/>
  </line>

  <!-- Status text with blink -->
  <text x="450" y="226" text-anchor="middle"
        font-family="'Courier New', monospace" font-size="13"
        fill="#00ff88" letter-spacing="3" filter="url(#glow)"
        style="animation: blink 3s infinite;">
    ▶  STATUS: RESEARCH MODE — ACTIVE
  </text>

  <!-- Corner labels -->
  <text x="25" y="255" font-family="monospace" font-size="9" fill="#00ff88" opacity="0.4">SYS::OK</text>
  <text x="820" y="255" font-family="monospace" font-size="9" fill="#00ccff" opacity="0.4">v2.0.26</text>
</svg>
