  <linearGradient id="glowTop" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" stop-color="#3AAFCC" stop-opacity="0"/>
    <stop offset="50%" stop-color="#3AAFCC" stop-opacity="0.8"/>
